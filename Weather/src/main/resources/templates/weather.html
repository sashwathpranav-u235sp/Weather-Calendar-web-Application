<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Information</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #74b9ff, #0984e3);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        .logout-button {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            color: #0984e3;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .logout-button:hover {
            background: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        .weather-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            text-align: center;
            min-width: 350px;
            max-width: 500px;
        }

        .location {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .date-time {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .current-weather {
            margin-bottom: 30px;
        }

        .temperature {
            font-size: 48px;
            font-weight: bold;
            color: #2d3436;
            margin-bottom: 10px;
        }

        .weather-description {
            font-size: 18px;
            color: #636e72;
            text-transform: capitalize;
            margin-bottom: 20px;
        }

        .weather-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        .weather-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .detail-item {
            background: rgba(116, 185, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .detail-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .detail-value {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        .feels-like {
            color: #636e72;
            font-size: 14px;
            margin-top: 5px;
        }

        @media (max-width: 480px) {
            .logout-button {
                top: 15px;
                right: 15px;
                padding: 8px 16px;
                font-size: 12px;
            }

            .weather-container {
                padding: 20px;
                min-width: 300px;
            }

            .temperature {
                font-size: 36px;
            }

            .weather-details {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<form action="/logout" method="get">
    <button type="submit" class="logout-button">Logout</button>
</form>


<div class="weather-container">
    <div class="location" id="location">Toronto, ON, Canada</div>
    <div class="date-time" id="dateTime">Monday, March 18, 2026 • 2:30 PM</div>

    <div class="current-weather">
        <div class="weather-icon" id="weatherIcon">🌡️</div>
        <div class="temperature" id="temperature">Loading...</div>
        <div class="weather-description" id="description">Loading weather data...</div>
        <div class="feels-like" id="feelsLike">Feels like --°C</div>
    </div>

    <div class="weather-details">
        <div class="detail-item">
            <div class="detail-label">Humidity</div>
            <div class="detail-value" id="humidity">--%</div>
        </div>
        <div class="detail-item">
            <div class="detail-label">Wind Speed</div>
            <div class="detail-value" id="windSpeed">-- km/h</div>
        </div>
        <div class="detail-item">
            <div class="detail-label">Pressure</div>
            <div class="detail-value" id="pressure">-- hPa</div>
        </div>
        <div class="detail-item">
            <div class="detail-label">Temperature</div>
            <div class="detail-value" id="tempDetail">--°C</div>
        </div>
    </div>
</div>

<script>
    // Logout function

    // Function to update date and time
    function updateDateTime() {
        const now = new Date();
        const options = {
            weekday: 'long',
            year: 'numeric',
            month: 'long',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
        };
        document.getElementById('dateTime').textContent =
            now.toLocaleDateString('en-US', options).replace(' at', ' •');
    }

    // Function to get weather icon based on temperature
    function getWeatherIcon(temperature) {
        if (temperature >= 25) return '☀️';
        if (temperature >= 15) return '⛅';
        if (temperature >= 5) return '☁️';
        if (temperature >= 0) return '🌤️';
        return '❄️';
    }

    // Function to get weather description based on temperature
    function getWeatherDescription(temperature, humidity, windSpeed) {
        if (temperature >= 25) return 'Hot';
        if (temperature >= 20) return 'Warm';
        if (temperature >= 15) return 'Mild';
        if (temperature >= 10) return 'Cool';
        if (temperature >= 0) return 'Cold';
        return 'Very Cold';
    }

    // Function to update weather data from API response
    function updateWeatherFromAPI(apiData) {
        const current = apiData.current;
        const units = apiData.current_units;

        // Extract data from API response
        const temperature = Math.round(current.temperature_2m);
        const apparentTemperature = Math.round(current.apparent_temperature);
        const humidity = current.relative_humidity_2m;
        const windSpeed = Math.round(current.wind_speed_10m);
        const pressure = Math.round(current.surface_pressure);

        // Get weather description and icon
        const description = getWeatherDescription(temperature, humidity, windSpeed);
        const weatherIcon = getWeatherIcon(temperature);

        // Update the display
        document.getElementById('temperature').textContent = temperature + '°C';
        document.getElementById('description').textContent = description;
        document.getElementById('feelsLike').textContent = `Feels like ${apparentTemperature}°C`;
        document.getElementById('humidity').textContent = humidity + '%';
        document.getElementById('windSpeed').textContent = windSpeed + ' km/h';
        document.getElementById('pressure').textContent = pressure + ' hPa';
        document.getElementById('tempDetail').textContent = temperature + '°C';
        document.getElementById('weatherIcon').textContent = weatherIcon;

        // Update location based on coordinates
        const lat = apiData.latitude;
        const lon = apiData.longitude;
        const timezone = apiData.timezone.replace('_', ' ').replace('/', ', ');
        //document.getElementById('location').textContent = `${timezone} (${lat.toFixed(2)}, ${lon.toFixed(2)})`;
        document.getElementById('location').textContent = "Toronto, ON, Canada"
        console.log('Weather data updated successfully:', {
            temperature,
            apparentTemperature,
            humidity,
            windSpeed,
            pressure,
            description
        });
    }

    // Sample function to update weather data (kept for backward compatibility)
    function updateWeatherData(data) {
        document.getElementById('location').textContent = data.location;
        document.getElementById('temperature').textContent = data.temperature + '°C';
        document.getElementById('description').textContent = data.description;
        document.getElementById('feelsLike').textContent = `Feels like ${data.feelsLike}°C`;
        document.getElementById('humidity').textContent = data.humidity + '%';
        document.getElementById('windSpeed').textContent = data.windSpeed + ' km/h';
        document.getElementById('pressure').textContent = data.pressure + ' hPa';
        document.getElementById('tempDetail').textContent = data.temperature + '°C';
        document.getElementById('weatherIcon').textContent = getWeatherIcon(data.description);
    }

    // Initialize the page
    updateDateTime();

    // Update time every minute
    setInterval(updateDateTime, 60000);

    // API fetching happens here
    let userdata;
    const ApiURL = "https://api.open-meteo.com/v1/forecast?latitude=43.7064&longitude=-79.3986&current=temperature_2m,relative_humidity_2m,surface_pressure,wind_speed_10m,apparent_temperature&timezone=America%2FNew_York";

    // Make a GET request
    fetch(ApiURL)
        .then(response => {
            if (!response.ok) {
                throw new Error('Network response was not ok');
            }
            return response.json();
        })
        .then(data => {
            userdata = data;
            console.log('API Data received:', data);

            // Update the weather display with the fetched data
            updateWeatherFromAPI(data);
        })
        .catch(error => {
            console.error('Error fetching weather data:', error);

            // Show error message to user
            document.getElementById('temperature').textContent = 'Error';
            document.getElementById('description').textContent = 'Failed to load weather data';
            document.getElementById('feelsLike').textContent = 'Please try again later';
        });
</script>
</body>
</html>
